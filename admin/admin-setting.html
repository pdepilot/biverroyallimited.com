<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Royal Chamber | Admin Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-royal: #0c0a0a;
      --bg-card: rgba(26, 22, 20, 0.85);
      --gold: #D4AF37;
      --gold-light: #f3d572;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --gold-dark: #9e7a2c;
      --text-light: #fef7e8;
      --text-muted: #c0b6a8;
      --border-glow: rgba(212, 175, 55, 0.25);
      --ff-serif: 'Cormorant Garamond', serif;
      --ff-sans: 'Outfit', sans-serif;
      --shadow-elegant: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #14100c, #050302);
      font-family: var(--ff-sans);
      color: var(--text-light);
      min-height: 100vh;
      position: relative;
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow), transparent);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 300px; height: 300px; top: 10%; left: -100px; }
    .orb-2 { width: 400px; height: 400px; bottom: 0; right: -100px; }

    .dashboard {
      display: flex;
      position: relative;
      z-index: 2;
    }

    /* Sidebar – consistent */
    .sidebar {
      width: 280px;
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-glow);
      padding: 2rem 1.2rem;
      height: 100vh;
      position: fixed;
      transition: transform 0.3s;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border-glow);
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      color: #0a0502;
    }
    .logo-text {
      font-family: var(--ff-serif);
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo-text span { color: var(--gold); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 40px;
      color: var(--text-muted);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
      backdrop-filter: blur(8px);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 1.2rem;
      right: 1.2rem;
      border-top: 1px solid var(--border-glow);
      padding-top: 1rem;
    }
    .logout {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .logout:hover { color: #e67e22; }

    /* Main content */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem 2.2rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .page-title {
      font-family: var(--ff-serif);
      font-size: 2rem;
      background: linear-gradient(120deg, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* settings grid */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 2rem;
    }
    .settings-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid var(--border-glow);
      padding: 1.8rem;
      transition: var(--transition);
    }
    .settings-card:hover {
      border-color: var(--gold);
      box-shadow: var(--shadow-elegant);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-glow);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }
    .card-header i {
      font-size: 1.8rem;
      color: var(--gold);
    }
    .card-header h2 {
      font-family: var(--ff-serif);
      font-size: 1.6rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border-glow);
      padding: 12px 18px;
      border-radius: 28px;
      color: white;
      font-family: var(--ff-sans);
      outline: none;
      transition: 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
    }
    .btn-gold {
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      color: #0a0502;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px var(--gold-glow);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      padding: 10px 28px;
      border-radius: 40px;
      color: var(--gold);
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-outline:hover {
      background: rgba(212,175,55,0.1);
    }
    .divider {
      height: 1px;
      background: var(--border-glow);
      margin: 1.5rem 0;
    }
    .danger-zone {
      border-color: rgba(231, 76, 60, 0.5);
      margin-top: 2rem;
    }
    .danger-zone .card-header i {
      color: #e74c3c;
    }
    .btn-danger {
      background: #e74c3c;
      border: none;
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f1b17;
      border-left: 4px solid var(--gold);
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 1100;
      animation: slideIn 0.3s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1rem; }
      .menu-toggle { display: block; }
      .settings-grid { grid-template-columns: 1fr; }
    }
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
    }
    .profile-preview {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .avatar-large {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, var(--gold-dark), var(--gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #0a0502;
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">BR</div>
      <div class="logo-text">Biver <span>Royalty</span></div>
    </div>
    <div class="nav-item" data-nav="properties" onclick="window.location.href='admin-property.html'">
      <i class="fas fa-building"></i> <span>Estates</span>
    </div>
    <div class="nav-item" data-nav="testimonials" onclick="window.location.href='admin-testimonial.html'">
      <i class="fas fa-star-of-life"></i> <span>Testimonials</span>
    </div>
    <div class="nav-item" data-nav="contacts" onclick="window.location.href='admin-contact.html'">
      <i class="fas fa-envelope"></i> <span>Correspondence</span>
    </div>
    <div class="nav-item active" data-nav="settings">
      <i class="fas fa-cog"></i> <span>Chamber Settings</span>
    </div>
    <div class="nav-item" data-nav="dashboard" onclick="window.location.href='admin-dashboard.html'">
      <i class="fas fa-chart-pie"></i> <span>Analytics</span>
    </div>
    <div class="sidebar-footer">
      <div class="logout" id="logoutBtn"><i class="fas fa-crown"></i> Exit Vault</div>
    </div>
  </aside>

  <div class="main">
    <div class="top-bar">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-grip-lines"></i></button>
        <h1 class="page-title"><i class="fas fa-sliders-h"></i> Royal Chamber Settings</h1>
      </div>
    </div>

    <div class="settings-grid">
      <!-- Profile Settings -->
      <div class="settings-card">
        <div class="card-header">
          <i class="fas fa-user-crown"></i>
          <h2>Admin Profile</h2>
        </div>
        <div class="profile-preview" id="profilePreview">
          <div class="avatar-large" id="avatarInitial">BR</div>
          <div>
            <strong id="profileName">Loading...</strong><br>
            <span class="email" id="profileEmail"></span>
          </div>
        </div>
        <form id="profileForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@example.com" required>
          </div>
          <div class="form-group">
            <label>Phone (optional)</label>
            <input type="tel" id="phone" placeholder="Contact number">
          </div>
          <button type="submit" class="btn-gold"><i class="fas fa-save"></i> Update Profile</button>
        </form>
      </div>

      <!-- Change Password -->
      <div class="settings-card">
        <div class="card-header">
          <i class="fas fa-lock"></i>
          <h2>Royal Key</h2>
        </div>
        <form id="passwordForm">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="currentPassword" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="At least 8 characters" required>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-gold"><i class="fas fa-key"></i> Change Password</button>
        </form>
      </div>

      <!-- Site Settings -->
      <div class="settings-card">
        <div class="card-header">
          <i class="fas fa-globe"></i>
          <h2>Site Configuration</h2>
        </div>
        <form id="siteSettingsForm">
          <div class="form-group">
            <label>Site Name</label>
            <input type="text" id="siteName" placeholder="Biver Royalty Homes">
          </div>
          <div class="form-group">
            <label>Contact Email (public)</label>
            <input type="email" id="contactEmail" placeholder="info@domain.com">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="contactPhone" placeholder="+234 XXX XXX XXXX">
          </div>
          <div class="form-group">
            <label>Address / Location</label>
            <textarea id="address" rows="2" placeholder="Royal headquarters address"></textarea>
          </div>
          <div class="form-group">
            <label>About Text (short)</label>
            <textarea id="aboutText" rows="3" placeholder="Luxury real estate description..."></textarea>
          </div>
          <button type="submit" class="btn-gold"><i class="fas fa-save"></i> Save Site Settings</button>
        </form>
      </div>

      <!-- Danger Zone -->
      <div class="settings-card danger-zone">
        <div class="card-header">
          <i class="fas fa-exclamation-triangle"></i>
          <h2>Danger Zone</h2>
        </div>
        <p style="margin-bottom: 1rem; font-size: 0.85rem;">These actions are irreversible. Proceed with royal caution.</p>
        <button id="clearCacheBtn" class="btn-outline" style="margin-right: 1rem;"><i class="fas fa-database"></i> Clear Dashboard Cache</button>
        <button id="exportDataBtn" class="btn-outline"><i class="fas fa-download"></i> Export All Data (JSON)</button>
        <div class="divider"></div>
        <button id="deleteAccountBtn" class="btn-danger"><i class="fas fa-skull"></i> Delete Admin Account</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ================= CONFIGURATION =================
  const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
  let token = localStorage.getItem('token');

  if (!token) {
    window.location.href = 'admin-login.html';
  }

  // API fetch wrapper
  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...options.headers
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
      throw new Error('Unauthorized');
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function showToast(msg, isError = false) {
    let toast = document.querySelector('.toast-msg');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#D4AF37';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // Load current admin profile & site settings
  let currentUser = {};

  async function loadProfile() {
    try {
      const data = await apiFetch('/users/me');
      currentUser = data;
      document.getElementById('fullName').value = data.name || '';
      document.getElementById('email').value = data.email || '';
      document.getElementById('phone').value = data.phone || '';
      // update preview
      const initials = data.name ? data.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : 'AD';
      document.getElementById('avatarInitial').innerText = initials;
      document.getElementById('profileName').innerText = data.name || 'Admin';
      document.getElementById('profileEmail').innerText = data.email || '';
    } catch (err) {
      showToast('Could not load profile', true);
    }
  }

  async function loadSiteSettings() {
    try {
      const data = await apiFetch('/settings');
      document.getElementById('siteName').value = data.siteName || 'Biver Royalty Homes';
      document.getElementById('contactEmail').value = data.contactEmail || '';
      document.getElementById('contactPhone').value = data.contactPhone || '';
      document.getElementById('address').value = data.address || '';
      document.getElementById('aboutText').value = data.aboutText || '';
    } catch (err) {
      // if endpoint doesn't exist, just use defaults
      console.warn('Settings endpoint not found');
    }
  }

  // Update profile
  document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      name: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value
    };
    try {
      await apiFetch('/users/profile', { method: 'PUT', body: JSON.stringify(payload) });
      showToast('Profile updated successfully');
      loadProfile(); // refresh
    } catch (err) {
      showToast('Update failed: ' + err.message, true);
    }
  });

  // Change password
  document.getElementById('passwordForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const current = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (newPass !== confirm) {
      showToast('New passwords do not match', true);
      return;
    }
    if (newPass.length < 6) {
      showToast('Password must be at least 6 characters', true);
      return;
    }
    try {
      await apiFetch('/auth/change-password', { method: 'POST', body: JSON.stringify({ currentPassword: current, newPassword: newPass }) });
      showToast('Password changed successfully');
      document.getElementById('passwordForm').reset();
    } catch (err) {
      showToast('Failed to change password', true);
    }
  });

  // Save site settings
  document.getElementById('siteSettingsForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      siteName: document.getElementById('siteName').value,
      contactEmail: document.getElementById('contactEmail').value,
      contactPhone: document.getElementById('contactPhone').value,
      address: document.getElementById('address').value,
      aboutText: document.getElementById('aboutText').value
    };
    try {
      await apiFetch('/settings', { method: 'PUT', body: JSON.stringify(payload) });
      showToast('Site settings saved');
    } catch (err) {
      showToast('Error saving settings', true);
    }
  });

  // Clear cache (just frontend)
  document.getElementById('clearCacheBtn')?.addEventListener('click', () => {
    localStorage.removeItem('dashboardCache');
    localStorage.removeItem('user');
    showToast('Cache cleared');
  });

  // Export data: fetch all and download JSON
  document.getElementById('exportDataBtn')?.addEventListener('click', async () => {
    try {
      const [properties, users, testimonials, contacts] = await Promise.all([
        apiFetch('/properties?limit=500').catch(() => ({ properties: [] })),
        apiFetch('/users?limit=200').catch(() => ({ users: [] })),
        apiFetch('/testimonials').catch(() => ({ data: [] })),
        apiFetch('/contacts').catch(() => ({ contacts: [] }))
      ]);
      const exportObj = {
        properties: properties.properties || [],
        users: users.users || [],
        testimonials: testimonials.data || [],
        contacts: contacts.contacts || [],
        exportDate: new Date().toISOString()
      };
      const dataStr = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `biver_royalty_export_${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Data exported successfully');
    } catch (err) {
      showToast('Export failed', true);
    }
  });

  // Delete admin account (extreme caution)
  document.getElementById('deleteAccountBtn')?.addEventListener('click', async () => {
    const confirmMsg = confirm('⚠️ PERMANENT ACTION: This will delete your admin account and all associated data. Are you absolutely sure?');
    if (!confirmMsg) return;
    const doubleConfirm = prompt('Type "DELETE ADMIN" to confirm:');
    if (doubleConfirm !== 'DELETE ADMIN') {
      showToast('Account deletion cancelled');
      return;
    }
    try {
      await apiFetch('/users/me', { method: 'DELETE' });
      localStorage.removeItem('token');
      showToast('Account deleted. Redirecting...');
      setTimeout(() => window.location.href = 'admin-login.html', 2000);
    } catch (err) {
      showToast('Deletion failed: ' + err.message, true);
    }
  });

  // logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'admin-login.html';
  });

  // mobile menu toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }

  // verify admin role
  async function verifyAdmin() {
    try {
      const me = await apiFetch('/users/me');
      if (me.role !== 'admin') throw new Error();
    } catch (err) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    }
  }

  verifyAdmin();
  loadProfile();
  loadSiteSettings();
</script>
</body>
</html>
