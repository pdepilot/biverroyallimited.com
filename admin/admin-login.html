<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Gate — Biver Royalty Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --prussian-deep: #0a0502;
            --prussian-base: #150a03;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #B8860B;
            --glass-bg: rgba(21, 10, 3, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-primary: #f0e6d3;
            --text-secondary: rgba(240, 230, 211, 0.7);
            --text-muted: rgba(240, 230, 211, 0.4);
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --ff-display: 'Cormorant Garamond', serif;
            --ff-body: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--ff-body);
            background: var(--prussian-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: min(440px, 90vw);
            perspective: 800px;
        }

        .seal-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            position: relative;
            transform-style: preserve-3d;
            animation: floatSeal 6s ease-in-out infinite;
        }
        @keyframes floatSeal {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            25% { transform: translateY(-8px) rotateY(10deg); }
            75% { transform: translateY(8px) rotateY(-10deg); }
        }

        .seal-ring {
            position: absolute;
            inset: 0;
            border: 3px solid var(--gold);
            border-radius: 50%;
            transform: rotateX(60deg) rotateZ(0deg);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.1);
            animation: ringRotate 20s linear infinite;
        }
        @keyframes ringRotate {
            from { transform: rotateX(60deg) rotateZ(0deg); }
            to { transform: rotateX(60deg) rotateZ(360deg); }
        }

        .seal-core {
            position: absolute;
            inset: 20px;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--ff-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--prussian-deep);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            transition: transform var(--transition), opacity var(--transition);
        }

        .seal-split-left,
        .seal-split-right {
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
            transition: transform 0.8s cubic-bezier(0.6, 0, 0.4, 1), opacity 0.4s;
            pointer-events: none;
        }
        .seal-split-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0% 100%);
            transform-origin: right center;
        }
        .seal-split-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
            transform-origin: left center;
        }

        .login-container.unlocked .seal-core {
            opacity: 0;
            transform: scale(0.5);
        }
        .login-container.unlocked .seal-split-left {
            transform: translateX(-60px) rotateY(-25deg);
        }
        .login-container.unlocked .seal-split-right {
            transform: translateX(60px) rotateY(25deg);
        }
        .login-container.unlocked .seal-ring {
            opacity: 0.3;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(212, 175, 55, 0.1);
            transform: translateY(0);
            transition: transform 0.4s, box-shadow 0.4s;
        }
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 28px 80px rgba(0,0,0,0.7), 0 0 100px rgba(212, 175, 55, 0.15);
        }

        .login-card h2 {
            font-family: var(--ff-display);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .login-card h2 span { color: var(--gold); }
        .login-card .subtitle {
            text-align: center;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 28px;
        }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 16px 16px 16px;
            color: var(--text-primary);
            font-family: var(--ff-body);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        .input-group label {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            pointer-events: none;
            transition: all 0.3s;
            transform-origin: left top;
            letter-spacing: 0.5px;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-28px) scale(0.85);
            color: var(--gold);
        }
        .input-group input::placeholder {
            color: transparent;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-family: var(--ff-body);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--prussian-deep);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            margin-top: 8px;
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.4);
        }
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        @media (max-width: 480px) {
            .seal-wrapper { width: 140px; height: 140px; }
            .login-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="login-container" id="loginContainer">
        <div class="seal-wrapper">
            <div class="seal-ring"></div>
            <div class="seal-core">B</div>
            <div class="seal-split-left"></div>
            <div class="seal-split-right"></div>
        </div>

        <div class="login-card">
            <h2>Biver <span>Royalty</span> Homes</h2>
            <p class="subtitle">Royal Command Center</p>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Unlock Vault</button>
                <div class="error-message" id="errorMsg"></div>
            </form>
        </div>
        <p class="footer-note">SECURE GATEWAY · BIOMETRIC & KEY AUTHENTICATION</p>
    </div>

    <script>
        // Gold Particle Field
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedY = Math.random() * 0.3 + 0.1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles(count = 40) {
            particles = [];
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Authentication Logic
        const API_BASE_URL = "https://api.biverroyaltyhomesltd.com/api";
        const loginContainer = document.getElementById('loginContainer');
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorMsg.textContent = '';
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                errorMsg.textContent = 'Please enter both email and password';
                return;
            }

            loginBtn.disabled = true;
            const originalText = loginBtn.innerText;
            loginBtn.innerText = 'Authenticating...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }

                const token = data.token || data.accessToken;
                const user = data.user || data;

                if (!token) throw new Error('No token received from server');

                const isAdmin = user.role === 'admin' || user.isAdmin === true || (user.roles && user.roles.includes('admin'));
                if (!isAdmin) {
                    throw new Error('Access restricted to administrators only');
                }

                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));

                loginContainer.classList.add('unlocked');

                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1200);

            } catch (err) {
                console.error('Login error:', err);
                errorMsg.textContent = err.message || 'Authentication failed. Please try again.';
                loginContainer.style.animation = 'none';
                loginContainer.offsetHeight;
                loginContainer.style.animation = 'shake 0.4s ease';
                setTimeout(() => loginContainer.style.animation = '', 400);
                loginBtn.disabled = false;
                loginBtn.innerText = originalText;
            }
        });

        if (localStorage.getItem('token')) {
            window.location.replace('admin-dashboard.html');
        }
    </script>
</body>
</html>
