<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Royal Estates | Property Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0c0a08;
      --bg-surface: #15120e;
      --gold-primary: #D4AF37;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --gold-dark: #9e7e2c;
      --text-light: #f5efe7;
      --text-muted: #b9af9f;
      --card-bg: rgba(30, 26, 22, 0.7);
      --border-gold: rgba(212, 175, 55, 0.3);
      --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --ff-serif: 'Cormorant Garamond', serif;
      --ff-sans: 'Outfit', sans-serif;
    }

    body {
      font-family: var(--ff-sans);
      background: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
    }

    /* animated bg */
    .bg-aura {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* layout */
    .app {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }

    /* sidebar premium */
    .sidebar {
      width: 280px;
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border-gold);
      padding: 2rem 1.2rem;
      position: fixed;
      height: 100vh;
      transition: transform 0.4s ease;
      z-index: 20;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-gold);
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: #0a0502;
    }
    .logo-text {
      font-family: var(--ff-serif);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .logo-text span { color: var(--gold-primary); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      margin: 8px 0;
      border-radius: 40px;
      color: var(--text-muted);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-item i { width: 24px; font-size: 1.2rem; }
    .nav-item.active, .nav-item:hover {
      background: rgba(212, 175, 55, 0.12);
      color: var(--gold-primary);
      backdrop-filter: blur(4px);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 1.2rem;
      right: 1.2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-gold);
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .logout-btn:hover { color: #e74c3c; }

    /* main content */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem 2.5rem;
    }

    /* top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .page-title {
      font-family: var(--ff-serif);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff, var(--gold-primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .action-group {
      display: flex;
      gap: 1rem;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--gold-primary), var(--gold-dark));
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 600;
      color: #0a0502;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: var(--ff-sans);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--gold-glow);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold-primary);
      padding: 8px 20px;
      border-radius: 40px;
      color: var(--gold-primary);
      cursor: pointer;
      transition: 0.2s;
    }
    /* search */
    .search-bar {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-gold);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 300px;
    }
    .search-bar i { color: var(--gold-primary); }
    .search-bar input {
      background: transparent;
      border: none;
      color: white;
      width: 100%;
      outline: none;
      font-size: 0.9rem;
    }

    /* property grid */
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .property-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid var(--border-gold);
      overflow: hidden;
      transition: var(--transition);
      animation: fadeUp 0.5s ease;
    }
    .property-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: var(--gold-primary);
      box-shadow: var(--shadow-xl);
    }
    .card-img {
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .price-tag {
      position: absolute;
      bottom: 12px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 700;
      color: var(--gold-primary);
      font-size: 1rem;
    }
    .card-content {
      padding: 1.5rem;
    }
    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      font-family: var(--ff-serif);
      margin-bottom: 0.5rem;
    }
    .location {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 1rem;
      border-top: 1px solid var(--border-gold);
      padding-top: 1rem;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .icon-btn.edit:hover { color: var(--gold-primary); }
    .icon-btn.delete:hover { color: #e74c3c; }

    /* modal premium */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-container {
      background: #1e1a16;
      border-radius: 48px;
      max-width: 600px;
      width: 90%;
      padding: 2rem;
      border: 1px solid var(--gold-primary);
      box-shadow: 0 0 50px rgba(212,175,55,0.2);
      animation: modalPop 0.3s ease;
    }
    .modal-container h3 {
      font-family: var(--ff-serif);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }
    .modal-container input, .modal-container textarea, .modal-container select {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-gold);
      padding: 12px 18px;
      border-radius: 28px;
      color: white;
      margin-bottom: 1rem;
      outline: none;
      font-family: var(--ff-sans);
    }
    .modal-container textarea { min-height: 100px; resize: vertical; }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1rem;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #2a241e;
      border-left: 4px solid var(--gold-primary);
      padding: 12px 24px;
      border-radius: 40px;
      color: white;
      z-index: 1200;
      animation: slideIn 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95);}
      to { opacity: 1; transform: scale(1);}
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px);}
      to { opacity: 1; transform: translateX(0);}
    }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1rem; }
      .top-bar { flex-direction: column; align-items: stretch; gap: 1rem; }
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.8rem;
      color: var(--gold-primary);
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .menu-toggle { display: block; }
    }
    .loader {
      text-align: center;
      padding: 3rem;
      color: var(--gold-primary);
    }
  </style>
</head>
<body>
<div class="bg-aura"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-icon">BR</div>
      <div class="logo-text">Biver <span>Royalty</span></div>
    </div>
    <div class="nav-item active" data-nav="properties">
      <i class="fas fa-building"></i> <span>Properties</span>
    </div>
    <div class="nav-item" data-nav="dashboard" onclick="window.location.href='admin-dashboard.html'">
      <i class="fas fa-chart-line"></i> <span>Analytics</span>
    </div>
    <div class="sidebar-footer">
      <div class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit Royal Vault</div>
    </div>
  </aside>

  <div class="main">
    <div class="top-bar">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h1 class="page-title"><i class="fas fa-crown" style="font-size: 1.8rem;"></i> Royal Property Estates</h1>
      </div>
      <div class="action-group">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search by title or location...">
        </div>
        <button class="btn-primary" id="addPropertyBtn"><i class="fas fa-plus-circle"></i> Add New Estate</button>
      </div>
    </div>

    <div id="propertiesContainer" class="properties-grid">
      <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Loading majestic properties...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="propertyModal" class="modal-overlay">
  <div class="modal-container">
    <h3 id="modalTitle">✨ Add / Edit Property</h3>
    <form id="propertyForm">
      <input type="hidden" id="propertyId">
      <input type="text" id="title" placeholder="Property Title" required>
      <input type="number" id="price" placeholder="Price (₦)" required>
      <select id="type">
        <option value="sale">For Sale</option>
        <option value="rent">For Rent</option>
      </select>
      <input type="text" id="location" placeholder="Location (e.g., Lagos, VI)" required>
      <input type="text" id="imageUrl" placeholder="Image URL (preview)">
      <textarea id="description" placeholder="Description of luxury..."></textarea>
      <div class="modal-buttons">
        <button type="button" class="btn-outline" id="closeModalBtn">Cancel</button>
        <button type="submit" class="btn-primary">Save Estate</button>
      </div>
    </form>
  </div>
</div>

<script>
  // API Configuration
  const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
  
  // Auth & State
  let token = localStorage.getItem('token');
  let properties = [];
  let currentFilter = '';

  // Helper: check authentication and redirect if needed
  if (!token) {
    window.location.href = 'admin-login.html';
  }

  // API wrapper with token refresh on 401
  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...options.headers
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
      throw new Error('Session expired');
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // Load properties
  async function loadProperties() {
    try {
      const data = await apiFetch('/properties?limit=100');
      properties = data.properties || [];
      renderProperties();
    } catch (err) {
      console.error(err);
      showToast("Could not load properties", true);
    }
  }

  // Render cards with search filter
  function renderProperties() {
    const container = document.getElementById('propertiesContainer');
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = properties.filter(p => 
      p.title?.toLowerCase().includes(searchTerm) || 
      p.location?.toLowerCase().includes(searchTerm)
    );
    if (filtered.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">🏰 No royal estates found. Add one now.</div>`;
      return;
    }
    container.innerHTML = filtered.map(prop => `
      <div class="property-card" data-id="${prop._id}">
        <div class="card-img" style="background-image: url('${prop.imageUrl || 'https://placehold.co/600x400?text=Luxury+Estate'}');">
          <div class="price-tag">₦${prop.price?.toLocaleString()} ${prop.type === 'rent' ? '/ year' : ''}</div>
        </div>
        <div class="card-content">
          <div class="card-title">${escapeHtml(prop.title)}</div>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(prop.location)}</div>
          <div style="font-size:0.8rem; opacity:0.8;">${prop.type === 'sale' ? '🏷️ For Sale' : '📄 For Rent'}</div>
          <div class="card-actions">
            <button class="icon-btn edit" data-id="${prop._id}"><i class="fas fa-edit"></i> Edit</button>
            <button class="icon-btn delete" data-id="${prop._id}"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        </div>
      </div>
    `).join('');
    // attach events
    document.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      openEditModal(id);
    }));
    document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      if (confirm('Permanently delete this majestic property?')) {
        await deleteProperty(id);
      }
    }));
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Delete
  async function deleteProperty(id) {
    try {
      await apiFetch(`/properties/${id}`, { method: 'DELETE' });
      showToast('Property deleted successfully');
      loadProperties();
    } catch (err) {
      showToast('Deletion failed', true);
    }
  }

  // Open Add / Edit modal
  function openEditModal(id = null) {
    const modal = document.getElementById('propertyModal');
    const form = document.getElementById('propertyForm');
    form.reset();
    document.getElementById('propertyId').value = '';
    document.getElementById('modalTitle').innerText = id ? '✍️ Refine Estate' : '🏆 Add New Property';
    if (id) {
      const prop = properties.find(p => p._id === id);
      if (prop) {
        document.getElementById('propertyId').value = prop._id;
        document.getElementById('title').value = prop.title || '';
        document.getElementById('price').value = prop.price || '';
        document.getElementById('type').value = prop.type || 'sale';
        document.getElementById('location').value = prop.location || '';
        document.getElementById('imageUrl').value = prop.imageUrl || '';
        document.getElementById('description').value = prop.description || '';
      }
    }
    modal.style.display = 'flex';
  }

  // Save property
  async function saveProperty(event) {
    event.preventDefault();
    const id = document.getElementById('propertyId').value;
    const payload = {
      title: document.getElementById('title').value,
      price: Number(document.getElementById('price').value),
      type: document.getElementById('type').value,
      location: document.getElementById('location').value,
      imageUrl: document.getElementById('imageUrl').value,
      description: document.getElementById('description').value
    };
    try {
      if (id) {
        await apiFetch(`/properties/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        showToast('Estate updated ✨');
      } else {
        await apiFetch('/properties', { method: 'POST', body: JSON.stringify(payload) });
        showToast('New estate listed!');
      }
      closeModal();
      loadProperties();
    } catch (err) {
      showToast('Error saving property', true);
    }
  }

  function closeModal() {
    document.getElementById('propertyModal').style.display = 'none';
  }

  function showToast(msg, isError = false) {
    let toast = document.querySelector('.toast');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#D4AF37';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'admin-login.html';
  });

  // Sidebar toggle mobile
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }

  // search event
  document.getElementById('searchInput')?.addEventListener('input', () => renderProperties());

  // Add property button
  document.getElementById('addPropertyBtn')?.addEventListener('click', () => openEditModal());

  // modal close events
  document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
  document.getElementById('propertyModal')?.addEventListener('click', (e) => {
    if(e.target === document.getElementById('propertyModal')) closeModal();
  });

  // form submission
  document.getElementById('propertyForm')?.addEventListener('submit', saveProperty);

  // initial load
  loadProperties();

  // verify token and role
  async function checkAdmin() {
    try {
      const me = await apiFetch('/users/me');
      if(me.role !== 'admin') throw new Error('not admin');
    } catch(e) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    }
  }
  checkAdmin();
</script>
</body>
</html>
