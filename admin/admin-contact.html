<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Royal Correspondence | Contact Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-royal: #0c0a0a;
      --bg-card: rgba(26, 22, 20, 0.75);
      --gold: #D4AF37;
      --gold-light: #f3d572;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --gold-dark: #9e7a2c;
      --text-light: #fef7e8;
      --text-muted: #c0b6a8;
      --border-glow: rgba(212, 175, 55, 0.25);
      --ff-serif: 'Cormorant Garamond', serif;
      --ff-sans: 'Outfit', sans-serif;
      --shadow-elegant: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #14100c, #050302);
      font-family: var(--ff-sans);
      color: var(--text-light);
      min-height: 100vh;
      position: relative;
    }

    /* floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow), transparent);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 300px; height: 300px; top: 10%; left: -100px; }
    .orb-2 { width: 400px; height: 400px; bottom: 0; right: -100px; }

    .dashboard {
      display: flex;
      position: relative;
      z-index: 2;
    }

    /* Sidebar (consistent with other admin pages) */
    .sidebar {
      width: 280px;
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-glow);
      padding: 2rem 1.2rem;
      height: 100vh;
      position: fixed;
      transition: transform 0.3s;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border-glow);
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      color: #0a0502;
    }
    .logo-text {
      font-family: var(--ff-serif);
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo-text span { color: var(--gold); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 40px;
      color: var(--text-muted);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
      backdrop-filter: blur(8px);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 1.2rem;
      right: 1.2rem;
      border-top: 1px solid var(--border-glow);
      padding-top: 1rem;
    }
    .logout {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .logout:hover { color: #e67e22; }

    /* Main content */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem 2.2rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .page-title {
      font-family: var(--ff-serif);
      font-size: 2rem;
      background: linear-gradient(120deg, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .search-delete {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .search-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glow);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-box input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 220px;
    }
    .btn-gold {
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border: none;
      padding: 8px 28px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      color: #0a0502;
    }
    .btn-gold:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px var(--gold-glow);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      padding: 8px 20px;
      border-radius: 40px;
      color: var(--gold);
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-outline:hover {
      background: rgba(212,175,55,0.1);
    }

    /* contacts grid – elegant cards */
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.8rem;
      margin-top: 1.5rem;
    }
    .contact-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid var(--border-glow);
      padding: 1.5rem;
      transition: var(--transition);
      animation: fadeSlideUp 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    .contact-card:hover {
      transform: translateY(-5px);
      border-color: var(--gold);
      box-shadow: var(--shadow-elegant);
    }
    .card-badge {
      position: absolute;
      top: 18px;
      right: 18px;
    }
    .badge-unread {
      background: var(--gold);
      color: #0a0502;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 40px;
      font-weight: bold;
    }
    .badge-read {
      background: rgba(255,255,255,0.1);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 40px;
    }
    .contact-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, var(--gold-dark), var(--gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #2c2418;
    }
    .contact-info h4 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .contact-info .email {
      font-size: 0.8rem;
      color: var(--gold);
      word-break: break-all;
    }
    .message-preview {
      margin: 1rem 0;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-muted);
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 20px;
      border-left: 2px solid var(--gold);
      max-height: 100px;
      overflow-y: auto;
    }
    .date {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1rem;
      border-top: 1px solid rgba(212,175,55,0.2);
      padding-top: 0.8rem;
    }
    .action-icon {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .action-icon.read:hover { color: var(--gold); }
    .action-icon.delete:hover { color: #e74c3c; }

    /* modal for viewing full message */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-card {
      background: #1d1915;
      border-radius: 48px;
      max-width: 600px;
      width: 90%;
      padding: 2rem;
      border: 1px solid var(--gold);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6);
      animation: modalPop 0.3s;
    }
    .modal-card h3 {
      font-family: var(--ff-serif);
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
    .modal-detail {
      margin: 1rem 0;
    }
    .modal-detail p {
      margin: 0.5rem 0;
      line-height: 1.5;
    }
    .modal-detail strong {
      color: var(--gold);
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f1b17;
      border-left: 4px solid var(--gold);
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 1100;
      animation: slideIn 0.3s;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1rem; }
      .menu-toggle { display: block; }
    }
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
    }
    .loader {
      text-align: center;
      padding: 3rem;
      grid-column: 1/-1;
      color: var(--gold);
    }
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">BR</div>
      <div class="logo-text">Biver <span>Royalty</span></div>
    </div>
    <div class="nav-item" data-nav="properties" onclick="window.location.href='admin-property.html'">
      <i class="fas fa-building"></i> <span>Estates</span>
    </div>
    <div class="nav-item" data-nav="testimonials" onclick="window.location.href='admin-testimonial.html'">
      <i class="fas fa-star-of-life"></i> <span>Testimonials</span>
    </div>
    <div class="nav-item active" data-nav="contacts">
      <i class="fas fa-envelope"></i> <span>Correspondence</span>
    </div>
    <div class="nav-item" data-nav="dashboard" onclick="window.location.href='admin-dashboard.html'">
      <i class="fas fa-chart-pie"></i> <span>Analytics</span>
    </div>
    <div class="sidebar-footer">
      <div class="logout" id="logoutBtn"><i class="fas fa-crown"></i> Exit Vault</div>
    </div>
  </aside>

  <div class="main">
    <div class="top-bar">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-grip-lines"></i></button>
        <h1 class="page-title"><i class="fas fa-inbox"></i> Royal Correspondence</h1>
      </div>
      <div class="search-delete">
        <div class="search-box">
          <i class="fas fa-search" style="color: var(--gold);"></i>
          <input type="text" id="searchInput" placeholder="Search name or email...">
        </div>
        <button class="btn-outline" id="deleteAllReadBtn"><i class="fas fa-trash-alt"></i> Delete Read</button>
      </div>
    </div>
    <div id="contactsContainer" class="contacts-grid">
      <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Loading noble messages...</div>
    </div>
  </div>
</div>

<!-- Modal for viewing full message -->
<div id="messageModal" class="modal">
  <div class="modal-card">
    <h3><i class="fas fa-feather-alt"></i> Royal Message</h3>
    <div class="modal-detail" id="modalDetail">
      <!-- dynamic content -->
    </div>
    <div class="modal-buttons">
      <button class="btn-outline" id="closeMessageModal">Close</button>
    </div>
  </div>
</div>

<script>
  // ======================== CONFIG =========================
  const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
  let token = localStorage.getItem('token');
  let contacts = [];

  // Auth guard
  if (!token) {
    window.location.href = 'admin-login.html';
  }

  // api fetch with auth
  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...options.headers
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
      throw new Error('Unauthorized');
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // Load contacts (inquiries)
  async function loadContacts() {
    try {
      // Assuming endpoint is /contacts or /inquiries – adjust if needed
      const data = await apiFetch('/contacts');
      contacts = data.contacts || data.data || [];
      renderContacts();
    } catch (err) {
      console.error(err);
      showToast("Could not load messages", true);
    }
  }

  function renderContacts() {
    const container = document.getElementById('contactsContainer');
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = contacts.filter(c => 
      c.name?.toLowerCase().includes(searchTerm) || 
      c.email?.toLowerCase().includes(searchTerm)
    );
    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-envelope-open-text"></i> No messages found. The royal court is quiet.</div>`;
      return;
    }
    container.innerHTML = filtered.map(c => {
      const isRead = c.isRead === true;
      const dateStr = c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : 'recent';
      const initial = c.name ? c.name.charAt(0).toUpperCase() : '?';
      return `
        <div class="contact-card" data-id="${c._id}">
          <div class="card-badge">
            ${!isRead ? '<span class="badge-unread"><i class="fas fa-envelope"></i> New</span>' : '<span class="badge-read"><i class="fas fa-check-circle"></i> Read</span>'}
          </div>
          <div class="contact-header">
            <div class="contact-icon">${initial}</div>
            <div class="contact-info">
              <h4>${escapeHtml(c.name)}</h4>
              <div class="email">${escapeHtml(c.email)}</div>
            </div>
          </div>
          <div class="message-preview">
            ${escapeHtml(c.message?.substring(0, 120))}${c.message?.length > 120 ? '...' : ''}
          </div>
          <div class="date">
            <span><i class="far fa-calendar-alt"></i> ${dateStr}</span>
            <span><i class="fas fa-reply-all"></i> via website</span>
          </div>
          <div class="card-actions">
            <button class="action-icon read" data-id="${c._id}"><i class="fas fa-eye"></i> View</button>
            ${!isRead ? `<button class="action-icon markread" data-id="${c._id}"><i class="fas fa-check-double"></i> Mark Read</button>` : ''}
            <button class="action-icon delete" data-id="${c._id}"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        </div>
      `;
    }).join('');

    // attach event listeners
    document.querySelectorAll('.read').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        openMessageModal(id);
      });
    });
    document.querySelectorAll('.markread').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        await markAsRead(id);
      });
    });
    document.querySelectorAll('.delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (confirm('Delete this message permanently?')) {
          await deleteContact(id);
        }
      });
    });
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  async function markAsRead(id) {
    try {
      await apiFetch(`/contacts/${id}`, { method: 'PATCH', body: JSON.stringify({ isRead: true }) });
      showToast('Marked as read');
      loadContacts(); // refresh
    } catch (err) {
      showToast('Error updating status', true);
    }
  }

  async function deleteContact(id) {
    try {
      await apiFetch(`/contacts/${id}`, { method: 'DELETE' });
      showToast('Message removed');
      loadContacts();
    } catch (err) {
      showToast('Delete failed', true);
    }
  }

  async function deleteAllRead() {
    const readIds = contacts.filter(c => c.isRead === true).map(c => c._id);
    if (readIds.length === 0) {
      showToast('No read messages to delete', false);
      return;
    }
    if (confirm(`Delete ${readIds.length} read message(s)? This action cannot be undone.`)) {
      try {
        // send bulk delete (if backend supports) or loop
        for (let id of readIds) {
          await apiFetch(`/contacts/${id}`, { method: 'DELETE' });
        }
        showToast(`${readIds.length} messages deleted`);
        loadContacts();
      } catch (err) {
        showToast('Error deleting messages', true);
      }
    }
  }

  function openMessageModal(id) {
    const contact = contacts.find(c => c._id === id);
    if (!contact) return;
    const modal = document.getElementById('messageModal');
    const detailDiv = document.getElementById('modalDetail');
    const dateStr = contact.createdAt ? new Date(contact.createdAt).toLocaleString() : 'Unknown date';
    detailDiv.innerHTML = `
      <p><strong><i class="fas fa-user"></i> Name:</strong> ${escapeHtml(contact.name)}</p>
      <p><strong><i class="fas fa-envelope"></i> Email:</strong> ${escapeHtml(contact.email)}</p>
      <p><strong><i class="fas fa-calendar"></i> Sent:</strong> ${dateStr}</p>
      <p><strong><i class="fas fa-comment"></i> Message:</strong></p>
      <p style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px;">${escapeHtml(contact.message)}</p>
    `;
    modal.style.display = 'flex';
    // auto mark as read when viewed
    if (!contact.isRead) {
      markAsRead(id).then(() => {
        // refresh after modal close? will be refreshed anyway on loadContacts
      });
    }
  }

  function closeMessageModal() {
    document.getElementById('messageModal').style.display = 'none';
    loadContacts(); // refresh to update read status
  }

  function showToast(msg, isError = false) {
    let toast = document.querySelector('.toast-msg');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#D4AF37';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'admin-login.html';
  });

  // mobile toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }

  // search filter
  document.getElementById('searchInput')?.addEventListener('input', () => renderContacts());

  // delete all read
  document.getElementById('deleteAllReadBtn')?.addEventListener('click', deleteAllRead);

  // modal close
  document.getElementById('closeMessageModal')?.addEventListener('click', closeMessageModal);
  document.getElementById('messageModal')?.addEventListener('click', (e) => {
    if(e.target === document.getElementById('messageModal')) closeMessageModal();
  });

  // verify admin role
  async function verifyAdmin() {
    try {
      const me = await apiFetch('/users/me');
      if (me.role !== 'admin') throw new Error();
    } catch (err) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    }
  }

  verifyAdmin();
  loadContacts();
</script>
</body>
</html>
