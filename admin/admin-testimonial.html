<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Royal Voices | Testimonials Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0c0a0a;
      --bg-card: rgba(26, 22, 20, 0.75);
      --gold: #D4AF37;
      --gold-light: #f3d572;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --gold-dark: #9e7a2c;
      --text-light: #fef7e8;
      --text-muted: #c0b6a8;
      --border-glow: rgba(212, 175, 55, 0.25);
      --ff-serif: 'Cormorant Garamond', serif;
      --ff-sans: 'Outfit', sans-serif;
      --shadow-elegant: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #14100c, #050302);
      font-family: var(--ff-sans);
      color: var(--text-light);
      min-height: 100vh;
      position: relative;
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow), transparent);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 300px; height: 300px; top: 10%; left: -100px; }
    .orb-2 { width: 400px; height: 400px; bottom: 0; right: -100px; }

    .dashboard {
      display: flex;
      position: relative;
      z-index: 2;
    }

    /* sidebar same luxury */
    .sidebar {
      width: 280px;
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-glow);
      padding: 2rem 1.2rem;
      height: 100vh;
      position: fixed;
      transition: transform 0.3s;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border-glow);
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      color: #0a0502;
    }
    .logo-text {
      font-family: var(--ff-serif);
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo-text span { color: var(--gold); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 40px;
      color: var(--text-muted);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
      backdrop-filter: blur(8px);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 1.2rem;
      right: 1.2rem;
      border-top: 1px solid var(--border-glow);
      padding-top: 1rem;
    }
    .logout {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .logout:hover { color: #e67e22; }

    /* main */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem 2.2rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .page-title {
      font-family: var(--ff-serif);
      font-size: 2rem;
      background: linear-gradient(120deg, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .search-add {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .search-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glow);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-box input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 220px;
    }
    .btn-gold {
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border: none;
      padding: 8px 28px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      color: #0a0502;
    }
    .btn-gold:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px var(--gold-glow);
    }

    /* testimonial cards grid */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }
    .testimonial-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid var(--border-glow);
      padding: 1.6rem;
      transition: var(--transition);
      animation: fadeSlideUp 0.5s ease;
    }
    .testimonial-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: var(--shadow-elegant);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(145deg, var(--gold-dark), var(--gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #2c2418;
      box-shadow: 0 0 0 2px rgba(212,175,55,0.3);
    }
    .client-info h4 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .stars {
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    .message {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-muted);
      margin: 1rem 0;
      font-style: italic;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1rem;
      border-top: 1px solid rgba(212,175,55,0.2);
      padding-top: 1rem;
    }
    .action-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .action-icon.edit:hover { color: var(--gold); }
    .action-icon.delete:hover { color: #e74c3c; }

    /* modal premium */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-card {
      background: #1d1915;
      border-radius: 48px;
      max-width: 550px;
      width: 90%;
      padding: 2rem;
      border: 1px solid var(--gold);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6);
      animation: modalPop 0.3s;
    }
    .modal-card h3 {
      font-family: var(--ff-serif);
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
    .modal-card input, .modal-card textarea, .modal-card select {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border-glow);
      padding: 12px 20px;
      border-radius: 32px;
      margin-bottom: 1rem;
      color: white;
      font-family: var(--ff-sans);
      outline: none;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      padding: 8px 20px;
      border-radius: 40px;
      color: var(--gold);
      cursor: pointer;
    }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f1b17;
      border-left: 4px solid var(--gold);
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 1100;
      animation: slideIn 0.3s;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1rem; }
      .menu-toggle { display: block; }
    }
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
    }
    .loader {
      text-align: center;
      padding: 3rem;
      grid-column: 1/-1;
      color: var(--gold);
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">BR</div>
      <div class="logo-text">Biver <span>Royalty</span></div>
    </div>
    <div class="nav-item" data-nav="properties" onclick="window.location.href='admin-property.html'">
      <i class="fas fa-building"></i> <span>Estates</span>
    </div>
    <div class="nav-item active" data-nav="testimonials">
      <i class="fas fa-star-of-life"></i> <span>Testimonials</span>
    </div>
    <div class="nav-item" data-nav="dashboard" onclick="window.location.href='admin-dashboard.html'">
      <i class="fas fa-chart-pie"></i> <span>Analytics</span>
    </div>
    <div class="sidebar-footer">
      <div class="logout" id="logoutBtn"><i class="fas fa-crown"></i> Exit Vault</div>
    </div>
  </aside>

  <div class="main">
    <div class="top-bar">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-grip-lines"></i></button>
        <h1 class="page-title"><i class="fas fa-comment-dots"></i> Voices of Nobility</h1>
      </div>
      <div class="search-add">
        <div class="search-box">
          <i class="fas fa-search" style="color: var(--gold);"></i>
          <input type="text" id="searchInput" placeholder="Search by name...">
        </div>
        <button class="btn-gold" id="addTestimonialBtn"><i class="fas fa-plus-circle"></i> Add Testimonial</button>
      </div>
    </div>
    <div id="testimonialsContainer" class="testimonials-grid">
      <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Loading royal testimonials...</div>
    </div>
  </div>
</div>

<!-- Modal for testimonial -->
<div id="testimonialModal" class="modal">
  <div class="modal-card">
    <h3 id="modalTitle">✨ New Royal Testimony</h3>
    <form id="testimonialForm">
      <input type="hidden" id="testimonialId">
      <input type="text" id="clientName" placeholder="Full name" required>
      <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5" step="1" required>
      <textarea id="message" rows="4" placeholder="Share the noble experience..." required></textarea>
      <input type="text" id="avatarInitials" placeholder="Initials (e.g., JD) - optional">
      <div class="modal-buttons">
        <button type="button" class="btn-outline" id="closeModalBtn">Cancel</button>
        <button type="submit" class="btn-gold">Save Testimony</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ======================== CONFIG =========================
  const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
  let token = localStorage.getItem('token');
  let testimonials = [];

  // Auth guard
  if (!token) {
    window.location.href = 'admin-login.html';
  }

  // api fetch with auth
  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...options.headers
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
      throw new Error('Unauthorized');
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // load testimonials
  async function loadTestimonials() {
    try {
      const data = await apiFetch('/testimonials');
      testimonials = data.data || data.testimonials || [];
      renderTestimonials();
    } catch (err) {
      console.error(err);
      showToast("Could not fetch testimonials", true);
    }
  }

  function renderStars(rating) {
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      stars += i <= rating ? '★' : '☆';
    }
    return stars;
  }

  function renderTestimonials() {
    const container = document.getElementById('testimonialsContainer');
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = testimonials.filter(t => t.name?.toLowerCase().includes(searchTerm));
    if (filtered.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;"><i class="fas fa-crown"></i> No testimonials yet. Be the first to add a royal voice.</div>`;
      return;
    }
    container.innerHTML = filtered.map(t => {
      const initials = t.initials || (t.name ? t.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : '👑');
      return `
        <div class="testimonial-card" data-id="${t._id}">
          <div class="card-header">
            <div class="avatar">${escapeHtml(initials)}</div>
            <div class="client-info">
              <h4>${escapeHtml(t.name)}</h4>
              <div class="stars">${renderStars(t.rating)}</div>
            </div>
          </div>
          <div class="message">“ ${escapeHtml(t.message)} ”</div>
          <div class="card-actions">
            <button class="action-icon edit" data-id="${t._id}"><i class="fas fa-feather-alt"></i> Edit</button>
            <button class="action-icon delete" data-id="${t._id}"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>
      `;
    }).join('');

    // attach edit/delete listeners
    document.querySelectorAll('.edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        openEditModal(id);
      });
    });
    document.querySelectorAll('.delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (confirm('Remove this noble testimony?')) {
          await deleteTestimonial(id);
        }
      });
    });
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  async function deleteTestimonial(id) {
    try {
      await apiFetch(`/testimonials/${id}`, { method: 'DELETE' });
      showToast('Testimonial removed', false);
      loadTestimonials();
    } catch (err) {
      showToast('Error deleting', true);
    }
  }

  function openEditModal(id = null) {
    const modal = document.getElementById('testimonialModal');
    const form = document.getElementById('testimonialForm');
    form.reset();
    document.getElementById('testimonialId').value = '';
    document.getElementById('modalTitle').innerHTML = id ? '✍️ Refine Royal Voice' : '🏆 New Testimonial';
    if (id) {
      const t = testimonials.find(t => t._id === id);
      if (t) {
        document.getElementById('testimonialId').value = t._id;
        document.getElementById('clientName').value = t.name || '';
        document.getElementById('rating').value = t.rating || 5;
        document.getElementById('message').value = t.message || '';
        document.getElementById('avatarInitials').value = t.initials || '';
      }
    }
    modal.style.display = 'flex';
  }

  async function saveTestimonial(e) {
    e.preventDefault();
    const id = document.getElementById('testimonialId').value;
    const payload = {
      name: document.getElementById('clientName').value,
      rating: parseInt(document.getElementById('rating').value),
      message: document.getElementById('message').value,
      initials: document.getElementById('avatarInitials').value || null
    };
    try {
      if (id) {
        await apiFetch(`/testimonials/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        showToast('Testimonial updated ✨');
      } else {
        await apiFetch('/testimonials', { method: 'POST', body: JSON.stringify(payload) });
        showToast('New testimony added!');
      }
      closeModal();
      loadTestimonials();
    } catch (err) {
      showToast('Failed to save', true);
    }
  }

  function closeModal() {
    document.getElementById('testimonialModal').style.display = 'none';
  }

  function showToast(msg, isError = false) {
    let toast = document.querySelector('.toast-msg');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#D4AF37';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'admin-login.html';
  });

  // mobile toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }

  // search filter
  document.getElementById('searchInput')?.addEventListener('input', () => renderTestimonials());

  // add button
  document.getElementById('addTestimonialBtn')?.addEventListener('click', () => openEditModal());

  // modal close
  document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
  document.getElementById('testimonialModal')?.addEventListener('click', (e) => {
    if(e.target === document.getElementById('testimonialModal')) closeModal();
  });

  document.getElementById('testimonialForm')?.addEventListener('submit', saveTestimonial);

  // check admin role
  async function verifyAdmin() {
    try {
      const me = await apiFetch('/users/me');
      if (me.role !== 'admin') throw new Error();
    } catch (err) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    }
  }

  verifyAdmin();
  loadTestimonials();
</script>
</body>
</html>
