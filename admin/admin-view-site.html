<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Royal Preview | Live Site Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-royal: #0c0a0a;
      --bg-card: rgba(26, 22, 20, 0.85);
      --gold: #D4AF37;
      --gold-light: #f3d572;
      --gold-glow: rgba(212, 175, 55, 0.3);
      --gold-dark: #9e7a2c;
      --text-light: #fef7e8;
      --text-muted: #c0b6a8;
      --border-glow: rgba(212, 175, 55, 0.25);
      --ff-serif: 'Cormorant Garamond', serif;
      --ff-sans: 'Outfit', sans-serif;
      --shadow-elegant: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body {
      background: radial-gradient(circle at 10% 20%, #14100c, #050302);
      font-family: var(--ff-sans);
      color: var(--text-light);
      min-height: 100vh;
      position: relative;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow), transparent);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 300px; height: 300px; top: 10%; left: -100px; }
    .orb-2 { width: 400px; height: 400px; bottom: 0; right: -100px; }

    .dashboard {
      display: flex;
      position: relative;
      z-index: 2;
    }

    /* Sidebar (consistent) */
    .sidebar {
      width: 280px;
      background: rgba(10, 8, 6, 0.85);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border-glow);
      padding: 2rem 1.2rem;
      height: 100vh;
      position: fixed;
      transition: transform 0.3s;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border-glow);
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
      color: #0a0502;
    }
    .logo-text {
      font-family: var(--ff-serif);
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo-text span { color: var(--gold); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 8px 0;
      border-radius: 40px;
      color: var(--text-muted);
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-item i { width: 24px; }
    .nav-item.active, .nav-item:hover {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
      backdrop-filter: blur(8px);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 2rem;
      left: 1.2rem;
      right: 1.2rem;
      border-top: 1px solid var(--border-glow);
      padding-top: 1rem;
    }
    .logout {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .logout:hover { color: #e67e22; }

    /* Main content */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem 2.2rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-family: var(--ff-serif);
      font-size: 2rem;
      background: linear-gradient(120deg, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .preview-tools {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-gold {
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      color: #0a0502;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px var(--gold-glow);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      padding: 8px 20px;
      border-radius: 40px;
      color: var(--gold);
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-outline:hover {
      background: rgba(212,175,55,0.1);
    }
    .device-selector {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border-glow);
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      gap: 12px;
    }
    .device-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .device-btn.active {
      background: var(--gold);
      color: #0a0502;
    }
    /* Preview Frame */
    .preview-container {
      flex: 1;
      background: #1a1612;
      border-radius: 32px;
      border: 1px solid var(--border-glow);
      overflow: hidden;
      box-shadow: var(--shadow-elegant);
      transition: all 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .iframe-wrapper {
      background: #fff;
      transition: all 0.3s;
      box-shadow: 0 0 0 2px rgba(212,175,55,0.2);
      border-radius: 8px;
    }
    #livePreview {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      transition: all 0.3s;
    }
    /* responsive widths */
    .preview-desktop .iframe-wrapper {
      width: 100%;
      height: 100%;
    }
    .preview-tablet .iframe-wrapper {
      width: 768px;
      height: 90%;
    }
    .preview-mobile .iframe-wrapper {
      width: 375px;
      height: 90%;
    }
    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f1b17;
      border-left: 4px solid var(--gold);
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 1100;
      animation: slideIn 0.3s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1rem; height: auto; }
      .menu-toggle { display: block; }
    }
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
    }
    .loading-overlay {
      position: absolute;
      background: rgba(0,0,0,0.6);
      color: var(--gold);
      font-size: 1.2rem;
      padding: 1rem;
      border-radius: 40px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">BR</div>
      <div class="logo-text">Biver <span>Royalty</span></div>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-property.html'">
      <i class="fas fa-building"></i> <span>Estates</span>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-testimonial.html'">
      <i class="fas fa-star-of-life"></i> <span>Testimonials</span>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-contact.html'">
      <i class="fas fa-envelope"></i> <span>Correspondence</span>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-settings.html'">
      <i class="fas fa-cog"></i> <span>Chamber Settings</span>
    </div>
    <div class="nav-item active">
      <i class="fas fa-eye"></i> <span>Live Preview</span>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-dashboard.html'">
      <i class="fas fa-chart-pie"></i> <span>Analytics</span>
    </div>
    <div class="sidebar-footer">
      <div class="logout" id="logoutBtn"><i class="fas fa-crown"></i> Exit Vault</div>
    </div>
  </aside>

  <div class="main">
    <div class="top-bar">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-grip-lines"></i></button>
        <h1 class="page-title"><i class="fas fa-globe"></i> Royal Site Preview</h1>
      </div>
      <div class="preview-tools">
        <div class="device-selector">
          <button class="device-btn active" data-device="desktop"><i class="fas fa-desktop"></i> Desktop</button>
          <button class="device-btn" data-device="tablet"><i class="fas fa-tablet-alt"></i> Tablet</button>
          <button class="device-btn" data-device="mobile"><i class="fas fa-mobile-alt"></i> Mobile</button>
        </div>
        <button class="btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="btn-gold" id="openNewTabBtn"><i class="fas fa-external-link-alt"></i> Open Full Site</button>
      </div>
    </div>
    <div class="preview-container" id="previewContainer">
      <div class="iframe-wrapper">
        <iframe id="livePreview" title="Live Website Preview" src="../index.html" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  // ===================== AUTH & CONFIG =====================
  const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
  let token = localStorage.getItem('token');

  if (!token) {
    window.location.href = 'admin-login.html';
  }

  // Helper: verify admin
  async function verifyAdmin() {
    try {
      const res = await fetch(`${API_BASE}/users/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error();
      const user = await res.json();
      if (user.role !== 'admin') throw new Error();
    } catch (err) {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    }
  }
  verifyAdmin();

  // DOM elements
  const iframe = document.getElementById('livePreview');
  const refreshBtn = document.getElementById('refreshBtn');
  const openNewTabBtn = document.getElementById('openNewTabBtn');
  const deviceBtns = document.querySelectorAll('.device-btn');
  const previewContainer = document.getElementById('previewContainer');
  let currentDevice = 'desktop';

  // Set the iframe source – using the main site URL (adjust as needed)
  // Try to load from relative path (assuming index.html is at root)
  let siteUrl = '../index.html'; // if admin page is in /admin/ folder, go up one level
  // Alternative: if your site is at root, use '/index.html'. We'll attempt to detect.
  // Provide fallback if fails
  iframe.onerror = () => {
    console.warn('Could not load index.html, trying fallback');
    iframe.src = '/';
  };
  iframe.src = siteUrl;

  // Refresh preview
  refreshBtn.addEventListener('click', () => {
    const currentSrc = iframe.src;
    iframe.src = '';
    setTimeout(() => { iframe.src = currentSrc; }, 100);
    showToast('Refreshing preview...');
  });

  // Open in new tab
  openNewTabBtn.addEventListener('click', () => {
    const baseUrl = iframe.src.split('?')[0];
    window.open(baseUrl, '_blank');
  });

  // Device view handling
  function setDevice(device) {
    currentDevice = device;
    // remove previous classes
    previewContainer.classList.remove('preview-desktop', 'preview-tablet', 'preview-mobile');
    if (device === 'desktop') {
      previewContainer.classList.add('preview-desktop');
      previewContainer.style.justifyContent = 'center';
      previewContainer.style.alignItems = 'center';
      const wrapper = document.querySelector('.iframe-wrapper');
      wrapper.style.width = '100%';
      wrapper.style.height = '100%';
    } else if (device === 'tablet') {
      previewContainer.classList.add('preview-tablet');
      const wrapper = document.querySelector('.iframe-wrapper');
      wrapper.style.width = '768px';
      wrapper.style.height = '90%';
    } else if (device === 'mobile') {
      previewContainer.classList.add('preview-mobile');
      const wrapper = document.querySelector('.iframe-wrapper');
      wrapper.style.width = '375px';
      wrapper.style.height = '90%';
    }
    // update active button style
    deviceBtns.forEach(btn => {
      if (btn.getAttribute('data-device') === device) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  deviceBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const device = btn.getAttribute('data-device');
      setDevice(device);
    });
  });
  setDevice('desktop');

  // show toast
  function showToast(msg, isError = false) {
    let toast = document.querySelector('.toast-msg');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#D4AF37';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'admin-login.html';
  });

  // mobile sidebar toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  }
</script>
</body>
</html>
