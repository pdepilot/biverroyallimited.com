<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Biver Royalty Homes Admin Dashboard – Manage properties, users, testimonials, and site content.">
  <title>Admin Dashboard | Biver Royalty Homes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --prussian-blue: #371801;
      --gold: #D4AF37;
      --gold-light: #FFD700;
      --gold-dark: #B8860B;
      --gold-gradient: linear-gradient(90deg, #D4AF37 0%, #FFD700 50%, #B8860B 100%);
      --dark-bg: #0f0a03;
      --sidebar-bg: #1e1508;
      --card-bg: #ffffff;
      --text-dark: #2c2418;
      --text-muted: #6c5e4e;
      --border-light: #e9e5dc;
      --danger: #dc3545;
      --success: #198754;
      --warning: #ffc107;
      --info: #0dcaf0;
      --ff-display: 'Cormorant Garamond', serif;
      --ff-body: 'Outfit', sans-serif;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.08);
      --transition: 0.2s ease;
    }

    body {
      font-family: var(--ff-body);
      background: #f9f7f2;
      color: var(--text-dark);
      overflow-x: hidden;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      color: #fff;
      position: fixed;
      height: 100vh;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(0,0,0,0.08);
    }
    .sidebar-header {
      padding: 28px 24px;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-logo img {
      width: 48px;
      height: auto;
    }
    .sidebar-logo span {
      font-family: var(--ff-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold-light);
    }
    .sidebar-nav {
      padding: 32px 16px;
    }
    .nav-item {
      margin-bottom: 8px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-radius: 12px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-link ion-icon {
      font-size: 22px;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(212,175,55,0.12);
      color: var(--gold-light);
    }
    .nav-link.active {
      border-left: 3px solid var(--gold);
      background: linear-gradient(90deg, rgba(212,175,55,0.15), transparent);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      padding: 20px 24px;
      border-top: 1px solid rgba(212,175,55,0.15);
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-weight: 500;
      padding: 8px 0;
    }
    .logout-btn:hover { color: var(--gold-light); }

    .main-content {
      flex: 1;
      margin-left: 280px;
      transition: margin 0.3s;
    }
    .topbar {
      background: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 90;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.92);
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--prussian-blue);
    }
    .page-title {
      font-family: var(--ff-display);
      font-size: 1.8rem;
      font-weight: 600;
    }
    .admin-badge {
      background: var(--gold-gradient);
      padding: 6px 16px;
      border-radius: 40px;
      color: var(--prussian-blue);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 24px 20px;
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(212,175,55,0.2);
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .stat-info h3 { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .stat-number { font-size: 2.5rem; font-weight: 700; font-family: var(--ff-display); color: var(--prussian-blue); }
    .stat-icon { font-size: 48px; color: var(--gold-dark); opacity: 0.7; }

    .panel {
      background: white;
      border-radius: 28px;
      padding: 24px 28px;
      margin-bottom: 40px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 16px;
    }
    .panel-header h2 {
      font-family: var(--ff-display);
      font-size: 1.6rem;
    }
    .btn-primary {
      background: var(--gold-gradient);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      color: var(--prussian-blue);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(212,175,55,0.4); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-dark);
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
    }
    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    th { font-weight: 600; color: var(--prussian-blue); }
    .action-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      margin: 0 4px;
      color: var(--text-muted);
    }
    .action-btn.edit:hover { color: var(--gold-dark); }
    .action-btn.delete:hover { color: var(--danger); }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      max-width: 550px;
      width: 90%;
      border-radius: 32px;
      padding: 32px;
      position: relative;
    }
    .modal-content h3 { margin-bottom: 20px; font-family: var(--ff-display); }
    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      font-family: var(--ff-body);
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 28px;
      cursor: pointer;
    }

    @media (max-width: 992px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .menu-toggle { display: block; }
    }
    .loading-spinner {
      text-align: center;
      padding: 40px;
    }
    .toast-msg {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--prussian-blue);
      color: white;
      padding: 14px 20px;
      border-radius: 40px;
      z-index: 1100;
    }
  </style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="./assets/images/biver-logo.png" alt="Logo" onerror="this.src='https://placehold.co/48x48?text=BR'">
        <span>Biver Royalty</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item"><a href="admin/admin-dashboard.html" class="nav-link active" data-section="overview"><ion-icon name="speedometer-outline"></ion-icon> Overview</a></div>
      <div class="nav-item"><a href="admin/admin-property.html" class="nav-link" data-section="properties"><ion-icon name="home-outline"></ion-icon> Properties</a></div>
      <div class="nav-item"><a href="admin/admin-analytics.html" class="nav-link" data-section="users"><ion-icon name="people-outline"></ion-icon> Analytics</a></div>
      <div class="nav-item"><a href="admin/admin-testimonial.html" class="nav-link" data-section="testimonials"><ion-icon name="chatbubbles-outline"></ion-icon> Testimonials</a></div>
      <div class="nav-item"><a href="admin/admin-contact.html" class="nav-link" data-section="inquiries"><ion-icon name="mail-outline"></ion-icon> Inquiries</a></div>
      <div class="nav-item"><a href="admin/admin-setting.html" class="nav-link" data-section="settings"><ion-icon name="settings-outline"></ion-icon> Settings</a></div>
    </div>
    <div class="sidebar-footer">
      <a href="admin/admin-view-site.html" class="logout-btn" target="_blank"><ion-icon name="eye-outline"></ion-icon> View Site</a>
      <a href="admin/admin-login.html" id="logoutBtn" class="logout-btn"><ion-icon name="log-out-outline"></ion-icon> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><ion-icon name="menu-outline"></ion-icon></button>
      <h1 class="page-title" id="mainTitle">Dashboard</h1>
      <div class="admin-badge">Admin Portal</div>
    </div>

    <div style="padding: 32px 28px;" id="dynamicContent">
      <div class="loading-spinner">Loading dashboard...</div>
    </div>
  </div>
</div>

<div id="entityModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" id="closeModal">&times;</span>
    <h3 id="modalTitle">Add / Edit</h3>
    <form id="entityForm">
      <input type="hidden" id="entityId">
      <div id="modalFields"></div>
      <button type="submit" class="btn-primary">Save Changes</button>
    </form>
  </div>
</div>

<script>
  (function() {
    const API_BASE = "https://api.biverroyaltyhomesltd.com/api";
    let currentSection = "overview";
    let chartInstance = null;
    let propertiesData = [], usersData = [], testimonialsData = [], inquiriesData = [];
    let currentModalType = null;

    function getToken() { return localStorage.getItem('token'); }
    
    function isAuthenticated() { return !!getToken(); }
    
    if (!isAuthenticated()) {
      window.location.href = 'admin-login.html';
      return;
    }

    async function apiFetch(endpoint, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
      if (res.status === 401) { 
        logout(); 
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function showToast(msg, isError = false) {
      let toast = document.querySelector('.toast-msg');
      if(toast) toast.remove();
      toast = document.createElement('div');
      toast.className = 'toast-msg';
      toast.style.background = isError ? '#dc3545' : '#371801';
      toast.innerText = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'admin-login.html';
    }

    async function verifyAdmin() {
      try {
        const res = await fetch(`${API_BASE}/users/me`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (!res.ok) throw new Error();
        const user = await res.json();
        if (user.role !== 'admin') throw new Error();
      } catch (err) {
        logout();
      }
    }

    async function fetchAllData() {
      try {
        const [properties, users, testimonials, inquiries] = await Promise.all([
          apiFetch('/properties?limit=100').catch(() => ({ properties: [] })),
          apiFetch('/users?limit=50').catch(() => ({ users: [] })),
          apiFetch('/testimonials').catch(() => ({ data: [] })),
          apiFetch('/contacts').catch(() => ({ contacts: [] }))
        ]);
        propertiesData = properties.properties || [];
        usersData = users.users || [];
        testimonialsData = testimonials.data || [];
        inquiriesData = inquiries.contacts || [];
      } catch (err) { 
        console.error(err); 
        showToast('Failed to load some data', true); 
      }
    }

    async function renderSection(section) {
      const container = document.getElementById('dynamicContent');
      if (!container) return;
      await fetchAllData();
      if (section === 'overview') renderOverview(container);
      else if (section === 'properties') renderPropertiesTable(container);
      else if (section === 'users') renderUsersTable(container);
      else if (section === 'testimonials') renderTestimonialsTable(container);
      else if (section === 'inquiries') renderInquiriesTable(container);
      else if (section === 'settings') renderSettings(container);
      document.getElementById('mainTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
      currentSection = section;
    }

    function renderOverview(container) {
      const totalProps = propertiesData.length;
      const totalUsers = usersData.length;
      const totalTest = testimonialsData.length;
      const totalInq = inquiriesData.length;
      const monthlyData = [12, 19, 15, 17, 22, 25, 30, 28, 34, 40, 45, 48];
      container.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div><h3>Total Properties</h3><div class="stat-number">${totalProps}</div></div><ion-icon name="home-outline" class="stat-icon"></ion-icon></div>
          <div class="stat-card"><div><h3>Registered Users</h3><div class="stat-number">${totalUsers}</div></div><ion-icon name="people-outline" class="stat-icon"></ion-icon></div>
          <div class="stat-card"><div><h3>Testimonials</h3><div class="stat-number">${totalTest}</div></div><ion-icon name="chatbubbles-outline" class="stat-icon"></ion-icon></div>
          <div class="stat-card"><div><h3>Inquiries</h3><div class="stat-number">${totalInq}</div></div><ion-icon name="mail-outline" class="stat-icon"></ion-icon></div>
        </div>
        <div class="panel"><div class="panel-header"><h2>Monthly Listings Activity</h2></div><canvas id="listingsChart" height="200"></canvas></div>
        <div class="panel"><div class="panel-header"><h2>Recent Properties</h2><a href="#" class="btn-outline" data-nav="properties">View All</a></div>
        <table><thead><tr><th>Title</th><th>Price (₦)</th><th>Status</th><th>Approval</th></tr></thead><tbody>
          ${propertiesData.slice(0,5).map(p => `<tr><td>${p.title}</td><td>₦${p.price?.toLocaleString()}</td><td>${p.type}</td><td>${p.approvalStatus || 'pending'}</td></tr>`).join('')}
        </tbody></table>
        </div>`;
      
      const ctx = document.getElementById('listingsChart')?.getContext('2d');
      if (ctx) {
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], datasets: [{ label: 'Listings added', data: monthlyData, borderColor: '#D4AF37', backgroundColor: 'rgba(212,175,55,0.1)', tension: 0.3, fill: true }] }, options: { responsive: true } });
      }
      document.querySelectorAll('[data-nav]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const section = link.getAttribute('data-nav');
          if(section) setActiveSection(section);
        });
      });
    }

    function renderPropertiesTable(container) {
      container.innerHTML = `<div class="panel"><div class="panel-header"><h2>Manage Properties</h2><button class="btn-primary" id="addPropertyBtn"><ion-icon name="add-circle-outline"></ion-icon> Add Property</button></div>
        <table id="propsTable"><thead><tr><th>Title</th><th>Price</th><th>Type</th><th>Approval</th><th>Actions</th></tr></thead><tbody>${propertiesData.map(p => `<tr data-id="${p._id}"><td>${p.title}</td><td>₦${p.price?.toLocaleString()}</td><td>${p.type}</td><td>${p.approvalStatus || 'pending'}</td><td><button class="action-btn edit" data-id="${p._id}"><ion-icon name="create-outline"></ion-icon></button><button class="action-btn delete" data-id="${p._id}"><ion-icon name="trash-outline"></ion-icon></button></td></tr>`).join('')}</tbody></table></div>`;
      document.getElementById('addPropertyBtn')?.addEventListener('click', () => openPropertyModal());
      document.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openPropertyModal(id); }));
      document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', async (e) => { const id = btn.getAttribute('data-id'); if(confirm('Delete property?')) await deleteEntity('properties', id); renderSection('properties'); }));
    }

    function renderUsersTable(container) {
      container.innerHTML = `<div class="panel"><div class="panel-header"><h2>Users</h2><button class="btn-primary" id="addUserBtn">Add User</button></div><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>${usersData.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role || 'user'}</td><td><button class="action-btn edit" data-id="${u._id}"><ion-icon name="create-outline"></ion-icon></button><button class="action-btn delete" data-id="${u._id}"><ion-icon name="trash-outline"></ion-icon></button></td></tr>`).join('')}</tbody></table></div>`;
      document.getElementById('addUserBtn')?.addEventListener('click', () => openUserModal());
      document.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openUserModal(id); }));
      document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', async (e) => { const id = btn.getAttribute('data-id'); if(confirm('Delete user?')) await deleteEntity('users', id); renderSection('users'); }));
    }

    function renderTestimonialsTable(container) {
      container.innerHTML = `<div class="panel"><div class="panel-header"><h2>Testimonials</h2><button class="btn-primary" id="addTestBtn">Add Testimonial</button></div><table><thead><tr><th>Name</th><th>Message</th><th>Actions</th></tr></thead><tbody>${testimonialsData.map(t => `<tr><td>${t.name}</td><td>${t.message.substring(0,60)}</td><td><button class="action-btn edit" data-id="${t._id}"><ion-icon name="create-outline"></ion-icon></button><button class="action-btn delete" data-id="${t._id}"><ion-icon name="trash-outline"></ion-icon></button></td></tr>`).join('')}</tbody></table></div>`;
      document.getElementById('addTestBtn')?.addEventListener('click', () => openTestimonialModal());
      document.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); openTestimonialModal(id); }));
      document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', async (e) => { const id = btn.getAttribute('data-id'); if(confirm('Delete testimonial?')) await deleteEntity('testimonials', id); renderSection('testimonials'); }));
    }

    function renderInquiriesTable(container) {
      container.innerHTML = `<div class="panel"><div class="panel-header"><h2>Contact Inquiries</h2></div><table><thead><tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th><th>Action</th></tr></thead><tbody>${inquiriesData.map(i => `<tr><td>${i.name}</td><td>${i.email}</td><td>${i.message?.substring(0,50)}</td><td>${new Date(i.createdAt).toLocaleDateString()}</td><td><button class="action-btn delete" data-id="${i._id}"><ion-icon name="trash-outline"></ion-icon></button></td></tr>`).join('')}</tbody></table></div>`;
      document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', async (e) => { const id = btn.getAttribute('data-id'); if(confirm('Delete inquiry?')) await deleteEntity('contacts', id); renderSection('inquiries'); }));
    }

    function renderSettings(container) {
      container.innerHTML = `<div class="panel"><div class="panel-header"><h2>Site Settings</h2></div><form id="siteSettingsForm"><div style="margin-bottom:20px;"><label>Site Name</label><input type="text" id="siteName" value="Biver Royalty Homes" class="form-control"></div><div><label>Contact Email</label><input type="email" id="siteEmail" value="biverroyaltyhomes01@gmail.com"></div><button type="submit" class="btn-primary">Save Settings</button></form><hr style="margin:30px 0"><div><h3>Danger Zone</h3><button id="clearCacheBtn" class="btn-danger" style="background:#dc3545; margin-top:10px;">Clear Dashboard Cache</button></div></div>`;
      document.getElementById('siteSettingsForm')?.addEventListener('submit', (e) => { e.preventDefault(); showToast('Settings saved (demo)'); });
      document.getElementById('clearCacheBtn')?.addEventListener('click', () => { localStorage.removeItem('dashboardCache'); showToast('Cache cleared'); });
    }

    async function deleteEntity(type, id) {
      try { 
        await apiFetch(`/${type}/${id}`, { method: 'DELETE' }); 
        showToast(`${type} deleted`); 
        await renderSection(currentSection);
      } catch(e){ showToast('Delete failed', true); }
    }

    function openPropertyModal(id = null) {
      currentModalType = 'property';
      const prop = id ? propertiesData.find(p => p._id === id) : null;
      document.getElementById('modalTitle').innerText = prop ? 'Edit Property' : 'Add Property';
      document.getElementById('modalFields').innerHTML = `
        <input type="text" id="title" placeholder="Title" value="${prop?.title || ''}">
        <input type="number" id="price" placeholder="Price (₦)" value="${prop?.price || ''}">
        <select id="type"><option ${prop?.type === 'sale' ? 'selected' : ''}>sale</option><option ${prop?.type === 'rent' ? 'selected' : ''}>rent</option></select>
        <input type="text" id="location" placeholder="Location" value="${prop?.location || ''}">
        <textarea id="description" placeholder="Description">${prop?.description || ''}</textarea>
      `;
      document.getElementById('entityId').value = id || '';
      document.getElementById('entityModal').style.display = 'flex';
      const form = document.getElementById('entityForm');
      form.onsubmit = async (e) => { e.preventDefault(); await saveProperty(); };
    }

    async function saveProperty() {
      const id = document.getElementById('entityId').value;
      const payload = { 
        title: document.getElementById('title').value, 
        price: parseInt(document.getElementById('price').value), 
        type: document.getElementById('type').value, 
        location: document.getElementById('location').value, 
        description: document.getElementById('description').value 
      };
      try {
        if (id) await apiFetch(`/properties/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiFetch('/properties', { method: 'POST', body: JSON.stringify(payload) });
        showToast('Property saved');
        closeModal();
        renderSection('properties');
      } catch(e) { showToast('Error saving', true); }
    }

    function openUserModal(id = null) {
      currentModalType = 'user';
      const user = id ? usersData.find(u => u._id === id) : null;
      document.getElementById('modalTitle').innerText = user ? 'Edit User' : 'Add User';
      document.getElementById('modalFields').innerHTML = `
        <input type="text" id="name" placeholder="Full Name" value="${user?.name || ''}">
        <input type="email" id="email" placeholder="Email" value="${user?.email || ''}">
        <select id="role"><option ${user?.role === 'admin' ? 'selected' : ''}>admin</option><option ${user?.role === 'user' ? 'selected' : ''}>user</option></select>
      `;
      document.getElementById('entityId').value = id || '';
      document.getElementById('entityModal').style.display = 'flex';
      const form = document.getElementById('entityForm');
      form.onsubmit = async (e) => { e.preventDefault(); await saveUser(); };
    }

    async function saveUser() {
      const id = document.getElementById('entityId').value;
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        role: document.getElementById('role').value
      };
      try {
        if (id) await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiFetch('/users', { method: 'POST', body: JSON.stringify(payload) });
        showToast('User saved');
        closeModal();
        renderSection('users');
      } catch(e) { showToast('Error saving user', true); }
    }

    function openTestimonialModal(id = null) {
      currentModalType = 'testimonial';
      const testimonial = id ? testimonialsData.find(t => t._id === id) : null;
      document.getElementById('modalTitle').innerText = testimonial ? 'Edit Testimonial' : 'Add Testimonial';
      document.getElementById('modalFields').innerHTML = `
        <input type="text" id="name" placeholder="Client Name" value="${testimonial?.name || ''}">
        <textarea id="message" placeholder="Testimonial message">${testimonial?.message || ''}</textarea>
        <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5" value="${testimonial?.rating || 5}">
      `;
      document.getElementById('entityId').value = id || '';
      document.getElementById('entityModal').style.display = 'flex';
      const form = document.getElementById('entityForm');
      form.onsubmit = async (e) => { e.preventDefault(); await saveTestimonial(); };
    }

    async function saveTestimonial() {
      const id = document.getElementById('entityId').value;
      const payload = {
        name: document.getElementById('name').value,
        message: document.getElementById('message').value,
        rating: parseInt(document.getElementById('rating').value)
      };
      try {
        if (id) await apiFetch(`/testimonials/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiFetch('/testimonials', { method: 'POST', body: JSON.stringify(payload) });
        showToast('Testimonial saved');
        closeModal();
        renderSection('testimonials');
      } catch(e) { showToast('Error saving testimonial', true); }
    }

    function closeModal() { document.getElementById('entityModal').style.display = 'none'; }

    function setActiveSection(section) {
      currentSection = section;
      renderSection(section);
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
        if(link.getAttribute('data-section') === section) link.classList.add('active');
      });
    }

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => { 
        e.preventDefault(); 
        const section = link.getAttribute('data-section'); 
        if(section) setActiveSection(section); 
      });
    });
    document.getElementById('menuToggle')?.addEventListener('click', () => document.getElementById('sidebar')?.classList.toggle('open'));
    document.getElementById('closeModal')?.addEventListener('click', closeModal);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('entityModal')) closeModal(); });

    verifyAdmin().then(() => {
      renderSection('overview');
    }).catch(() => logout());
  })();
</script>
</body>
</html>
